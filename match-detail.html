<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Details</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#171738">
</head>
<body>
    <header>
        <h1>Match Details</h1>
        <nav>
            <a href="index.html">← Terug</a>
        </nav>
    </header>

    <main style="padding: 20px;" id="detail-content">
        <p class="empty-state">Wedstrijdgegevens laden... ⏳</p>
    </main>

    <!-- Supabase SDK inladen -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/database.js"></script>

    <script>
        let huidigeMatch = null;

        window.deelViaWhatsApp = function() {
            if (!huidigeMatch) return;

            let tekst = `⚽ *Wedstrijd update ${huidigeMatch.speler}!*\n\n`;
            tekst += `Tegenstander: *${huidigeMatch.tegenstander}*\n`;
            tekst += `Uitslag: *${huidigeMatch.score_thuis} - ${huidigeMatch.score_uit}*\n\n`;

            if (huidigeMatch.status === 'Afwezig') {
                tekst += `${huidigeMatch.speler} was afwezig (${huidigeMatch.reden_afwezig}).\n\n`;
            } else {
                const goals = huidigeMatch.doelpunten_speler || 0;
                const assists = huidigeMatch.assists || 0;

                if (goals > 0 || assists > 0) {
                    tekst += `📊 *Stats ${huidigeMatch.speler}:*\n`;
                    if (goals > 0) tekst += `- ${goals} Doelpunt(en) 🎯\n`;
                    if (assists > 0) tekst += `- ${assists} Assist(s) 👟\n`;
                    tekst += `\n`;
                } else {
                    tekst += `Goed gewerkt op het veld! 💪\n\n`;
                }
            }
            
            tekst += `Bekijk alle foto's en details in de app:\n${window.location.href}`;
            const encodedTekst = encodeURIComponent(tekst);
            window.open(`https://wa.me/?text=${encodedTekst}`, '_blank');
        };

        async function laadMatchDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('id');
            const contentDiv = document.getElementById('detail-content');

            if (!matchId) {
                contentDiv.innerHTML = '<p class="empty-state">Geen wedstrijd geselecteerd.</p>';
                return;
            }

            try {
                const { data: match, error } = await supabaseClient
                    .from('wedstrijden')
                    .select('*')
                    .eq('id', matchId)
                    .single();

                if (error) throw error;
                huidigeMatch = match;

                const datumMooi = new Date(match.datum).toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const assists = match.assists || 0;
                const weer = match.weer || 'Onbekend weer';
                const ondergrond = match.ondergrond || 'Onbekende ondergrond';

                let galerijHtml = '<p class="empty-state">Geen foto\'s toegevoegd.</p>';
                if (match.fotos && match.fotos.length > 0) {
                    galerijHtml = '<div class="photo-gallery">';
                    match.fotos.forEach(fotoUrl => {
                        galerijHtml += `<a href="${fotoUrl}" target="_blank"><img src="${fotoUrl}" alt="Actiefoto"></a>`;
                    });
                    galerijHtml += '</div>';
                }

                // Check of er kaarten zijn, zo niet, toon niets
                const heeftKaarten = match.kaarten && (match.kaarten.geel > 0 || match.kaarten.rood > 0);
                const kaartenHtml = heeftKaarten 
                    ? `<p><strong>Kaarten:</strong> ${match.kaarten.geel} Geel, ${match.kaarten.rood} Rood</p>` 
                    : ``;

                contentDiv.innerHTML = `
                    <div class="detail-header">
                        <h2>${match.tegenstander}</h2>
                        <p>${datumMooi} • ${match.type_wedstrijd}</p>
                        <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">☁️ ${weer} • ⚽ ${ondergrond}</p>
                    </div>

                    <div class="scoreboard">
                        <div class="score-block">
                            <span>Thuis</span>
                            <strong>${match.score_thuis}</strong>
                        </div>
                        <div class="score-divider">-</div>
                        <div class="score-block">
                            <span>Uit</span>
                            <strong>${match.score_uit}</strong>
                        </div>
                    </div>

                    <div class="stats-card">
                        <h3 style="margin-bottom: 10px; color: var(--space-indigo);">Statistieken ${match.speler}</h3>
                        ${match.status === 'Afwezig' 
                            ? `<p style="color: var(--lobster-pink); font-weight:bold;">Afwezig: ${match.reden_afwezig}</p>` 
                            : `<p><strong>Doelpunten:</strong> ${match.doelpunten_speler} &nbsp;|&nbsp; <strong>Assists:</strong> ${assists}</p>`
                        }
                        <p><strong>Locatie:</strong> ${match.locatie}</p>
                        ${kaartenHtml}
                    </div>

                    <button class="wa-share-btn" onclick="deelViaWhatsApp()">
                        <span>📱</span> Deel via WhatsApp
                    </button>

                    <h3 style="margin-bottom: 15px; color: var(--space-indigo); margin-top:25px;">Wedstrijdfoto's</h3>
                    ${galerijHtml}
                `;

            } catch (error) {
                console.error("Fout:", error);
                contentDiv.innerHTML = '<p class="empty-state">Fout bij het laden van de wedstrijd.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', laadMatchDetails);
    </script>
</body>
</html>
