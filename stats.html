<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Statistieken</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js inladen voor de grafieken -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="theme-color" content="#171738">
</head>
<body>
    <header>
        <h1>Statistieken</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="stats.html" class="active">Stats</a>
        </nav>
    </header>

    <!-- Tabbladen voor de spelers -->
    <div class="tabs">
        <button class="tab-btn active" onclick="wisselSpeler(event, 'Lou')">Lou</button>
        <button class="tab-btn" onclick="wisselSpeler(event, 'Noé')">Noé</button>
    </div>

    <main style="padding: 20px; padding-bottom: 100px;">
        <h2 id="speler-titel" style="color: var(--space-indigo); font-weight: 900; margin-bottom: 20px;">Statistieken Lou</h2>
        
        <p id="loading-msg" class="empty-state">Grafieken berekenen... ⏳</p>
        
        <div id="stats-container" style="display: none;">
            <!-- Donut Grafiek (Winst/Verlies) -->
            <div class="stats-card">
                <h3 style="text-align:center; color: var(--space-indigo); margin-bottom: 15px; font-weight: 900;">Resultaten</h3>
                <div style="position: relative; height: 220px; width: 100%;">
                    <canvas id="resultatenChart"></canvas>
                </div>
            </div>
            
            <!-- Bar Grafiek (Doelpunten over tijd) -->
            <div class="stats-card">
                <h3 style="text-align:center; color: var(--space-indigo); margin-bottom: 15px; font-weight: 900;">Doelpunten per Match</h3>
                <div style="position: relative; height: 240px; width: 100%;">
                    <canvas id="doelpuntenChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase SDK inladen -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/database.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>
