<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voetbal App</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#171738">
</head>
<body>
    <header>
        <h1>Overzicht</h1>
        <nav><a href="stats.html">Statistieken</a></nav>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="wisselSpeler(event, 'Lou')">Lou</button>
        <button class="tab-btn" onclick="wisselSpeler(event, 'Noé')">Noé</button>
    </div>

    <main id="wedstrijden-lijst" class="tab-content active" style="padding-bottom: 120px;">
        <p class="empty-state">Gegevens laden... ⏳</p>
    </main>

    <a href="add-match.html" class="fab-btn">+ Match</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/database.js"></script>

    <script>
        async function laadWedstrijden(speler) {
            const container = document.getElementById('wedstrijden-lijst');
            container.innerHTML = '<p class="empty-state">Wedstrijden laden... ⏳</p>';

            try {
                const { data: matchen, error } = await supabaseClient.from('wedstrijden').select('*').eq('speler', speler).order('datum', { ascending: false });
                if (error) throw error;
                
                if (matchen.length === 0) {
                    container.innerHTML = `<div class="empty-state-noe"><h2>Geen matchen</h2><p style="color: var(--rebecca-purple); font-weight:700;">Voeg de eerste wedstrijd toe voor ${speler}!</p></div>`; return;
                }

                // 1. QUICK STATS BEREKENEN
                let gespeeldSpeler = 0; let gespeeldDoelman = 0; let goals = 0; let assists = 0;
                matchen.forEach(m => {
                    if (m.status === 'Meegedaan') {
                        if (m.mini_scores && m.mini_scores.length > 0) {
                            m.mini_scores.forEach(score => {
                                if (score.is_doelman) gespeeldDoelman++; else gespeeldSpeler++;
                                goals += (score.goals || 0);
                                assists += (score.assists || 0);
                            });
                        } else {
                            if (m.is_doelman) gespeeldDoelman++; else gespeeldSpeler++;
                            goals += (m.doelpunten_speler || 0);
                            assists += (m.assists || 0);
                        }
                    }
                });

                let html = `
                    <div class="quick-stats-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;">
                        <div class="qs-card indigo"><span class="qs-icon">👟</span><span class="qs-num">${gespeeldSpeler}</span><span class="qs-text">Als Speler</span></div>
                        <div class="qs-card" style="background: var(--almond-silk); color: var(--space-indigo); border-bottom: 4px solid var(--rebecca-purple);"><span class="qs-icon">🧤</span><span class="qs-num">${gespeeldDoelman}</span><span class="qs-text">Als Keeper</span></div>
                        <div class="qs-card purple"><span class="qs-icon">⚽</span><span class="qs-num">${goals}</span><span class="qs-text">Goals</span></div>
                        <div class="qs-card pink"><span class="qs-icon">🎯</span><span class="qs-num">${assists}</span><span class="qs-text">Assists</span></div>
                    </div>
                `;

                // 2. WEDSTRIJDKAARTJES GENEREREN
                matchen.forEach(match => {
                    // Mooie datum genereren voor de balk
                    const datumMooi = new Date(match.datum).toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long' });
                    
                    // Berekenen van de totale uitslag van de dag
                    let totaalThuis = 0; let totaalUit = 0;
                    if (match.mini_scores && match.mini_scores.length > 0) {
                        match.mini_scores.forEach(s => { totaalThuis += s.thuis; totaalUit += s.uit; });
                    } else {
                        totaalThuis = match.score_thuis || 0; totaalUit = match.score_uit || 0;
                    }

                    // Logica: Wie staat links en wie staat rechts? (Afhankelijk van Thuis/Uit)
                    let eigenPloegNaam = match.eigen_ploeg || "KV Kester Gooik";
                    let tegenstanderNaam = match.tegenstander;
                    let linksTeam, rechtsTeam, linksScore, rechtsScore;

                    if (match.locatie === 'Uit') {
                        linksTeam = tegenstanderNaam;
                        rechtsTeam = eigenPloegNaam;
                        linksScore = totaalThuis;  // Bij Uit spelen is de tegenstander de thuisploeg
                        rechtsScore = totaalUit;
                    } else {
                        linksTeam = eigenPloegNaam;
                        rechtsTeam = tegenstanderNaam;
                        linksScore = totaalThuis;
                        rechtsScore = totaalUit;
                    }

                    // Lijntjes per sub-match genereren
                    let subMatchesHtml = '';
                    if (match.mini_scores && match.mini_scores.length > 0) {
                        match.mini_scores.forEach((score, index) => {
                            let statusClass = 'draw';
                            if (score.thuis > score.uit) statusClass = match.locatie === 'Thuis' ? 'win' : 'loss';
                            if (score.thuis < score.uit) statusClass = match.locatie === 'Thuis' ? 'loss' : 'win';
                            
                            let iconen = score.is_doelman ? '🧤' : '👟';
                            if(score.goals > 0) iconen += ' ⚽'.repeat(score.goals);
                            
                            subMatchesHtml += `
                                <div class="sub-match-line">
                                    <span>Match ${index + 1}</span>
                                    <div style="display:flex; align-items:center; gap: 10px;">
                                        <span class="sub-match-icons">${iconen}</span>
                                        <span class="sub-match-score ${statusClass}">${score.thuis} - ${score.uit}</span>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    html += `
                        <a href="match-detail.html?id=${match.id}" class="match-card-v2">
                            <div class="match-date-header">📅 ${datumMooi}</div>
                            <div class="total-score-bar">
                                <span class="team-name left">${linksTeam}</span>
                                <span class="score-badge">${linksScore} - ${rechtsScore}</span>
                                <span class="team-name right">${rechtsTeam}</span>
                            </div>
                            <div class="sub-matches-list">
                                ${subMatchesHtml || '<div class="sub-match-line" style="justify-content:center;">Geen data ingegeven</div>'}
                            </div>
                        </a>
                    `;
                });
                container.innerHTML = html;
            } catch (err) { container.innerHTML = '<p class="empty-state">Kon wedstrijden niet laden.</p>'; }
        }

        window.wisselSpeler = function(evt, speler) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            evt.currentTarget.classList.add('active');
            laadWedstrijden(speler);
        };
        document.addEventListener('DOMContentLoaded', () => laadWedstrijden('Lou'));
    </script>
</body>
</html>
