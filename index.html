<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voetbal Stats</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <!-- De kleur van de adresbalk op mobiel -->
    <meta name="theme-color" content="#2ecc71">
</head>
<body>
    <!-- Bovenste navigatiebalk -->
    <header>
        <h1>Voetbal Stats</h1>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="stats.html">Statistieken</a>
        </nav>
    </header>

    <!-- Tabbladen voor de spelers -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'lou')">Lou</button>
        <button class="tab-btn" onclick="openTab(event, 'noe')">Noé</button>
    </div>

    <!-- Inhoud Lou -->
    <main id="lou" class="tab-content active">
        <h2>Seizoen 26-27</h2>
        
        <div class="wedstrijden-lijst" id="wedstrijden-container-lou">
            <!-- Straks laadt JavaScript hier de wedstrijden in -->
            <p class="empty-state">Nog geen wedstrijden gespeeld.</p>
        </div>

        <!-- Zwevende knop om een match toe te voegen (zoals in veel apps) -->
        <a href="add-match.html" class="fab-btn">+ Match</a>
    </main>

    <!-- Inhoud Noé -->
    <main id="noe" class="tab-content">
        <div class="empty-state-noe">
            <h2>Nog even geduld! ⏳</h2>
            <p>Noé start pas binnen 2 jaar. Het veld wacht op hem!</p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
