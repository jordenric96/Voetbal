<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Toevoegen</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#171738">
</head>
<body>
    <header>
        <h1>+ Nieuwe Match</h1>
        <nav><a href="index.html">Annuleer</a></nav>
    </header>

    <main style="padding: 20px;">
        <div id="pin-screen" class="pin-container">
            <h2>Toegang Beveiligd 🔒</h2>
            <input type="password" id="pincode-input" class="pin-input" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="****">
            <button type="button" class="submit-btn" onclick="checkPin()">Ontgrendel</button>
            <p id="pin-error" style="color: var(--lobster-pink); display: none; font-weight: 900;">Foutieve code.</p>
        </div>

        <div id="form-screen" style="display: none;">
            <form id="matchForm">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Speler</label>
                        <select id="speler" required>
                            <option value="Lou">Lou</option>
                            <option value="Noé">Noé</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Datum</label>
                        <input type="date" id="datum" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Categorie</label>
                        <input type="text" id="categorie" value="U6" required>
                    </div>
                    <div class="form-group">
                        <label>Wedstrijdvorm</label>
                        <select id="match_format" required>
                            <option value="2v2" selected>2v2</option>
                            <option value="3v3">3v3</option>
                            <option value="5v5">5v5</option>
                            <option value="8v8">8v8</option>
                            <option value="11v11">11v11</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group autocomplete-container" style="flex: 1;">
                        <label>Tegenstander (Ploegnaam)</label>
                        <input type="text" id="tegenstander" placeholder="Typ om te zoeken..." required autocomplete="off">
                        <div id="autocomplete-lijst" class="autocomplete-items"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Logo Tegenstander</label>
                        <input type="file" id="logo_tegenstander" accept="image/png, image/jpeg">
                        <div id="logo-gevonden-status" class="logo-status">✅ Bekend logo gevonden!</div>
                    </div>
                    <div class="form-group">
                        <label>Locatie</label>
                        <select id="locatie" required>
                            <option value="Thuis">Thuis</option>
                            <option value="Uit">Uit</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="status" onchange="toggleAfwezig()" required>
                        <option value="Meegedaan">Meegedaan</option>
                        <option value="Afwezig">Afwezig</option>
                    </select>
                </div>

                <div class="form-group" id="reden_afwezig_blok" style="display: none;">
                    <label>Reden van afwezigheid</label>
                    <input type="text" id="reden_afwezig" placeholder="Bijv. Ziek, vakantie...">
                </div>

                <!-- DYNAMISCHE UITSLAGEN -->
                <div class="form-group" style="margin-top: 25px; border-top: 2px dashed var(--almond-silk); padding-top: 20px;">
                    <label style="font-size: 16px; color: var(--space-indigo);">⚽ De Wedstrijdjes (Uitslagen & Stats)</label>
                    <div id="mini-scores-wrapper" style="margin-top: 10px;"></div>
                    <button type="button" class="add-score-btn" onclick="addScoreRow()">+ Extra uitslag toevoegen</button>
                </div>

                <div class="form-group">
                    <label>Wedstrijdfoto's (Heel het toernooi)</label>
                    <input type="file" id="fotos" accept="image/png, image/jpeg" multiple>
                </div>

                <button type="button" class="submit-btn" onclick="saveMatch()">Opslaan</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <script src="js/database.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
